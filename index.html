<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MNIST Draw — Real-time Digit Recognition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.22.0/dist/tf.min.js"></script>
  <style>
    body { background: radial-gradient(circle at top, rgba(96,165,250,0.14), transparent 28%),
                   linear-gradient(180deg,#020617,#081220); color: #e6eef8; }
    .glass { background: rgba(15,23,42,0.72); backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.08); }
    .bar { height: 16px; border-radius: 9999px; background: rgba(148,163,184,0.12); overflow: hidden; }
    .bar-inner { height: 100%; border-radius: 9999px; background: linear-gradient(90deg,#38bdf8,#34d399); width: 0%; transition: width 260ms ease; }
    .digit-box { min-width: 120px; min-height: 120px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
    <section class="glass p-6 rounded-3xl shadow-2xl shadow-slate-950/20 flex flex-col items-center gap-4">
      <div class="self-start text-slate-300 text-sm font-medium">Draw a digit (0–9)</div>
      <canvas id="drawCanvas" width="280" height="280" class="rounded-3xl border border-slate-700 shadow-inner" style="touch-action:none; background:#08111f;"></canvas>
      <div class="flex flex-wrap gap-3 justify-center">
        <button id="clearBtn" class="px-4 py-2 rounded-2xl border border-slate-600 text-slate-200 hover:bg-slate-700/30 transition">Clear</button>
        <button id="undoBtn" class="px-4 py-2 rounded-2xl border border-slate-600 text-slate-200 hover:bg-slate-700/30 transition">Undo</button>
        <button id="saveBtn" class="px-4 py-2 rounded-2xl bg-sky-400 text-slate-950 font-semibold hover:bg-sky-300 transition">Save PNG</button>
      </div>
      <p class="text-xs text-slate-500 text-center max-w-md">The canvas is preprocessed on pointer release to match MNIST: crop, center of mass, 20×20 digit, 28×28 frame, and normalize to [0,1].</p>
    </section>

    <section class="glass p-6 rounded-3xl shadow-2xl shadow-slate-950/20">
      <div class="flex items-center justify-between">
        <div class="text-slate-300 uppercase tracking-[0.2em] text-xs">Prediction</div>
        <div id="modelStatus" class="text-slate-500 text-xs">Loading model…</div>
      </div>
      <div class="mt-8 flex flex-col gap-6 lg:flex-row lg:items-center">
        <div class="digit-box flex items-center justify-center rounded-3xl bg-slate-950/70 border border-slate-700 shadow-inner">
          <div id="topDigit" class="text-7xl lg:text-8xl font-extrabold leading-none text-white">—</div>
        </div>
        <div class="flex-1">
          <div id="confidenceText" class="text-slate-400 text-sm mb-4">Confidence: —</div>
          <div id="bars" class="space-y-3"></div>
        </div>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
